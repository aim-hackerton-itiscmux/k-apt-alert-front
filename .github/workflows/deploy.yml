name: Flutter Web → Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # subosito/flutter-action은 Flutter SDK를 GitHub Actions 캐시에 저장해
      # 재빌드 시 다운로드를 건너뜁니다.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build web
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL="${API_BASE_URL}" \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=AUTH_REDIRECT_URL="${AUTH_REDIRECT_URL}"
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://xnyhzyvigazofjoozuub.supabase.co/functions/v1' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://xnyhzyvigazofjoozuub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AUTH_REDIRECT_URL: ${{ vars.AUTH_REDIRECT_URL || '' }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # PR → Preview 배포
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy build/web --prebuilt --token "$VERCEL_TOKEN" --yes

      # main push → Production 배포
      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy build/web --prebuilt --prod --token "$VERCEL_TOKEN" --yes

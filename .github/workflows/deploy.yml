name: Deploy to Vercel (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FLUTTER_VERSION: "3.41.7"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (with SDK cache)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://xnyhzyvigazofjoozuub.supabase.co/functions/v1' }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://xnyhzyvigazofjoozuub.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AUTH_REDIRECT_URL: ${{ vars.AUTH_REDIRECT_URL }}
        run: |
          flutter config --enable-web
          flutter build web \
            --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=AUTH_REDIRECT_URL="$AUTH_REDIRECT_URL"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production

      - name: Package prebuilt output (vercel build)
        # vercel-build.sh detects existing build/web and skips re-running Flutter,
        # so this step just packages the prebuilt artifacts into .vercel/output.
        run: vercel build --prod

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod
